<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Library | AI Study Companion</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Basic Theme Styles to keep your Dark Mode working */
      body {
        transition:
          background-color 0.3s,
          color 0.3s;
        min-height: 100vh;
      }
        /* General Body */
        body { transition: background-color 0.3s, color 0.3s; min-height: 100vh; }
        .dark-mode { background-color: #121212 !important; color: #e0e0e0 !important; }

        /* Cards and Text Inside Cards (Fixes Bugs 2 & 3) */
        .dark-mode .card { background-color: #1e1e1e !important; border-color: #333 !important; }
        .dark-mode .card-body,
        .dark-mode .form-label, 
        .dark-mode .card-title { color: #e0e0e0 !important; }
        
        /* Sidebar Menu Fixes (Fixes Bug 1) */
        .dark-mode .offcanvas { background-color: #1e1e1e !important; border-right: 1px solid #333; }
        .dark-mode .offcanvas-header.bg-light,
        .dark-mode .mt-auto.bg-light { background-color: #1e1e1e !important; border-color: #333 !important; }
        .dark-mode .offcanvas-title { color: #fff !important; }
        .dark-mode .list-group-item:not(.bg-primary) { background-color: #1e1e1e !important; color: #e0e0e0 !important; border-color: #333 !important; }
        .dark-mode .list-group-item:not(.bg-primary):hover { background-color: #2a2a2a !important; color: #fff !important; }
        .dark-mode .btn-close { filter: invert(1) grayscale(100%) brightness(200%); } /* Makes the 'X' button white */

        /* Inputs & Selects */
        .dark-mode .form-control, 
        .dark-mode .form-select { background-color: #2a2a2a !important; color: #fff !important; border-color: #444 !important; }
        .dark-mode .form-control::placeholder { color: #888 !important; }
        .dark-mode .text-muted { color: #adb5bd !important; }
    </style>
  </head>
  <body class="bg-light">
    <!-- ========================================== -->
    <!-- 1. NAVBAR                                  -->
    <!-- ========================================== -->
    <nav class="navbar py-3 sticky-top bg-primary shadow-sm">
      <div class="container d-flex justify-content-between align-items-center">
        <!-- LEFT SIDE: Hamburger Button + Title -->
        <div class="d-flex align-items-center">
          <button
            class="btn shadow-none p-0 me-3 text-white fs-4 border-0"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarMenu"
            aria-controls="sidebarMenu"
          >
            ☰
          </button>
          <span class="navbar-brand mb-0 h4 fw-bold text-white"
            >🎓 AI Study Companion</span
          >
        </div>

        <!-- RIGHT SIDE: Theme, User Badge, Logout -->
        <div class="d-flex align-items-center gap-3">
          <button
            class="btn btn-outline-light btn-sm fw-bold"
            onclick="toggleTheme()"
            id="themeSwitcher"
          >
            🌙 Dark Mode
          </button>
          <span
            id="userDisplay"
            class="badge bg-white text-primary d-none"
          ></span>
          <button
            onclick="handleLogout()"
            class="btn btn-sm btn-danger px-3 rounded-pill d-none"
            id="logoutBtn"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- ========================================== -->
    <!-- 2. THE SLIDING SIDEBAR (OFFCANVAS)         -->
    <!-- ========================================== -->
    <div
      class="offcanvas offcanvas-start shadow"
      tabindex="-1"
      id="sidebarMenu"
      aria-labelledby="sidebarMenuLabel"
    >
      <div class="offcanvas-header bg-light border-bottom">
        <h5 class="offcanvas-title fw-bold text-primary" id="sidebarMenuLabel">
          Menu
        </h5>
        <button
          type="button"
          class="btn-close shadow-none"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>

      <div class="offcanvas-body d-flex flex-column p-0">
        <!-- Navigation Links -->
        <div class="list-group list-group-flush mt-2">
          <!-- Notice how index.html is now just normal text -->
          <a
            href="index.html"
            class="list-group-item list-group-item-action py-3 text-muted"
          >
            🏠 AI Upload & Analyze
          </a>

          <!-- Notice how database.html is now ACTIVE (Blue) -->
          <a
            href="database.html"
            class="list-group-item list-group-item-action bg-primary text-white fw-bold py-3"
          >
            📚 Database & PYQs (Active)
          </a>

          <!-- Placeholders for your Phase 2 Features -->
          <a
            href="quiz.html"
            class="list-group-item list-group-item-action py-3 text-muted"
          >
            ✍️ Dynamic Quizzes
          </a>

          <a
            href="search.html"
            class="list-group-item list-group-item-action py-3 text-muted"
          >
            🔍 University Search
          </a>
        </div>

        <div class="mt-auto p-3 border-top bg-light">
          <p class="small text-muted mb-0">Version 2.0 In Progress 🚀</p>
        </div>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- 3. DATABASE & PYQ MAIN CONTENT             -->
    <!-- ========================================== -->
    <div class="container mt-4 mb-5">
      <h2 class="fw-bold text-primary mb-4">📚 Academic Library</h2>

      <!-- Filter Controls Card -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-bold">Course</label>
              <select id="courseSelect" class="form-select shadow-none">
                <option value="BCA">BCA</option>
                <option value="BSc">BSc</option>
                <option value="BCom">BCom</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Semester</label>
              <select id="semesterSelect" class="form-select shadow-none">
                <option value="1st Sem">1st Semester</option>
                <option value="2nd Sem">2nd Semester</option>
                <option value="3rd Sem">3rd Semester</option>
                <option value="4th Sem">4th Semester</option>
                <option value="5th Sem">5th Semester</option>
                <option value="6th Sem">6th Semester</option>
              </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button
                onclick="fetchMaterials()"
                class="btn btn-primary w-100 fw-bold shadow-none"
              >
                🔍 Search Materials
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Results Area -->
      <div id="resultsArea" class="row g-4">
        <!-- Dynamic Cards will appear here -->
        <div class="col-12 text-center text-muted mt-5">
          <p class="fs-5">
            Select your course and semester above to view notes, Q&A, and PYQs.
          </p>
        </div>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- 4. SCRIPTS                                 -->
    <!-- ========================================== -->
    <!-- Bootstrap JS Bundle (Required for Sidebar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // --- Dark Mode Toggle Function ---
      function toggleTheme() {
        document.body.classList.toggle("dark-mode");
        const btn = document.getElementById("themeSwitcher");
        if (document.body.classList.contains("dark-mode")) {
          btn.innerText = "☀️ Light Mode";
          btn.classList.replace("btn-outline-light", "btn-light");
          btn.classList.replace("text-white", "text-dark");
        } else {
          btn.innerText = "🌙 Dark Mode";
          btn.classList.replace("btn-light", "btn-outline-light");
          btn.classList.replace("text-dark", "text-white");
        }
      }

      // --- Fetch Materials Function ---
      async function fetchMaterials() {
        const course = document.getElementById("courseSelect").value;
        const semester = document.getElementById("semesterSelect").value;
        const resultsArea = document.getElementById("resultsArea");

        // Show loading state
        resultsArea.innerHTML = `
                <div class="col-12 text-center mt-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 fw-bold text-muted">Searching database...</p>
                </div>`;

        try {
          // Call your FastAPI backend (Make sure main.py is running!)
          const response = await fetch(
            `http://127.0.0.1:8000/materials/${course}/${semester}`,
          );

          if (!response.ok) {
            throw new Error("Backend not responding");
          }

          const data = await response.json();

          // Clear loading state
          resultsArea.innerHTML = "";

          // If no data is found
          if (!data.materials || data.materials.length === 0) {
            resultsArea.innerHTML = `
                        <div class="col-12 text-center text-muted mt-4">
                            <h5>No materials found for ${course} - ${semester} yet.</h5>
                            <p>Try adding some data to your backend database first!</p>
                        </div>`;
            return;
          }

          // Loop through the data and create a card for each file
          data.materials.forEach((item) => {
            // Set color based on material type
            let badgeColor = "bg-secondary";
            if (item.material_type === "PYQ") badgeColor = "bg-danger";
            if (item.material_type === "Notes") badgeColor = "bg-success";
            if (item.material_type === "Q&A")
              badgeColor = "bg-warning text-dark";

            resultsArea.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card shadow-sm h-100 border-0 border-top border-4 border-primary">
                                <div class="card-body">
                                    <span class="badge ${badgeColor} mb-2">${item.material_type}</span>
                                    <h5 class="card-title fw-bold text-primary">${item.subject}</h5>
                                    <p class="card-text text-muted small">${item.title}</p>
                                    <a href="${item.file_url}" target="_blank" class="btn btn-outline-primary btn-sm w-100 fw-bold">
                                        📥 Download / View
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
          });
        } catch (error) {
          console.error("Error fetching materials:", error);
          resultsArea.innerHTML = `
                    <div class="col-12 text-center mt-4">
                        <div class="alert alert-danger d-inline-block">
                            <strong>Connection Error:</strong> Could not connect to the backend.<br>
                            Ensure your FastAPI server (<code>uvicorn main:app --reload</code>) is running!
                        </div>
                    </div>`;
        }
      }
    </script>
  </body>
</html>
